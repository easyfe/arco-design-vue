name: Deploy Docs to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tools
        run: pnpm -F @arco-design/arco-changelog -F @arco-design/vite-plugin-arco-vue-docs -F @arco-design/arco-vue-scripts run build

      - name: Reinstall to link bins
        run: pnpm install

      - name: Init component library
        run: pnpm -F @easyfe/arco-design-vue run init

      - name: Build docs site
        run: pnpm run build:site
        env:
          AssetsPublicPath: /arco-design-vue/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/arco-vue-docs/dist
